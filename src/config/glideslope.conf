# ---------------------------------------------------------
# Glide-Slope Guidance Parameters
# ---------------------------------------------------------
# Descent-rate limits per phase, phase-specific horizontal PD gains,
# target-blend smoothing, and early-translation during braking.

# Max descent rates per phase (m/s)
GLIDESLOPE_K_ALT = 0.8  # deprecated
GLIDESLOPE_RATE_POWERED_DESCENT = 94.8889
GLIDESLOPE_RATE_HOVER = 8.89986
GLIDESLOPE_RATE_TERMINAL = 0.761376

# PD phase gains (position-blend based)
PD_KP_POS_LATERAL = 1.73904
PD_KD_VEL_LATERAL = 1.05021

# ---------------------------------------------------------
# Velocity-Based Horizontal Guidance
# ---------------------------------------------------------
# Target horizontal velocity = APPROACH_K * (pad_pos - current_pos),
# capped at APPROACH_MAX.  Vehicle aims straight at the pad,
# naturally decelerating as it gets close.  No position-blend
# needed — eliminates overshoot limit cycles.

TARGET_BLEND_TICKS = 29  # ~10 s at 20 Hz — smooth convergence to pad

PAD_OFFSET_EARLY_THRESHOLD = 263.642
PAD_OFFSET_EARLY_ALPHA = 0.00866133

# FRAME-003: ratio of current descent speed that the glideslope target
# is capped to.  Lower = harder braking (converges to 0 faster).
# At 0.5 the vehicle over-brakes and may ascend (wastes fuel).
# At 0.9 it descends near free-fall speed with gentle braking,
# and the sqrt law provides the final deceleration near the floor.
GLIDESLOPE_TARGET_RATIO = 0.856198

HOVER_KP_POS_LATERAL = 2.15341
HOVER_KD_VEL_LATERAL = 0.531803
HOVER_APPROACH_K = 0.103492
HOVER_APPROACH_MAX = 11.4792

TERMINAL_KP_POS_LATERAL = 2.91274
TERMINAL_KD_VEL_LATERAL = 6.05345
TERMINAL_APPROACH_K = 0.104468
TERMINAL_APPROACH_MAX = 5.67112
