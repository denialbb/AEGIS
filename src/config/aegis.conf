# ---------------------------------------------------------
# AEGIS — General Mission Configuration
# ---------------------------------------------------------
# Control loop, state-machine thresholds, landing target, guidance
# controller gains, FDI sensitivity, logging, and HUD parameters.

import numpy as np

# ---------------------------------------------------------
# Control Loop & System
# ---------------------------------------------------------
TARGET_HZ = 20.0

# Use KSP stock SAS for attitude stabilisation.
USE_SAS = True

# Enable SAS in prograde mode during ascent for a stable test start.
SAS_PROGRADE_ASCENT = True

# ---------------------------------------------------------
# Landing Target (Default: KSC Launchpad)
# ---------------------------------------------------------
TARGET_LAT = -0.0972
TARGET_LON = -74.5577
PAD_POSITION_ECEF = np.array([159779.71, -1018.00, -578408.50])
LANDING_PAD_POSITION = np.array([0.0, 0.0, 0.0])
TOUCHDOWN_ALTITUDE = 2.15

# ---------------------------------------------------------
# State Machine Parameters
# ---------------------------------------------------------
ACTIVATION_ACTION_GROUP = 9
ALT_HYPERSONIC = 10000.0
ALT_POWERED_DESCENT = 2000.0
ALT_HOVER = 100.0
ALT_TERMINAL = 30.0
ALT_LANDING = 5.0

# ---------------------------------------------------------
# Mission Timeout
# ---------------------------------------------------------
MAX_MISSION_TIME = 300.0

# ---------------------------------------------------------
# Landed Timer Parameters
# ---------------------------------------------------------
LANDED_VEL_THRESHOLD = 0.5
LANDED_ALT_THRESHOLD = 1.0

# ---------------------------------------------------------
# Fault Detection & Isolation
# ---------------------------------------------------------
FDI_THRESHOLD = 5.0

# ---------------------------------------------------------
# Simulation Determinism
# ---------------------------------------------------------
RANDOM_SEED = 42
NOISELESS_MODE = False

# ---------------------------------------------------------
# Guidance Controller Gains (PD)
# ---------------------------------------------------------
GUIDANCE_KP_POS_LATERAL = 0.8
GUIDANCE_KP_POS_VERTICAL = 0.5
GUIDANCE_KD_VEL_LATERAL = 2.0
GUIDANCE_KD_VEL_VERTICAL = 1.5

# Attitude Controller
ATTITUDE_KP = 2.5
ATTITUDE_KD = 0.5
ATTITUDE_MAX_PITCH_DEG = 25.0

# Attitude controller direct gains (fallback when inertia-scaling inactive)
GUIDANCE_KP_ATT = [10.0, 10.0, 10.0]
GUIDANCE_KD_ATT = [20.0, 20.0, 20.0]

# Attitude natural frequency & damping (used when inertia-scaling is active)
GUIDANCE_ATT_NATURAL_FREQ = [1.0, 1.0, 1.0]
GUIDANCE_ATT_DAMPING_RATIO = [1.0, 1.0, 1.0]

# ---------------------------------------------------------
# Acceleration Command Clamp
# ---------------------------------------------------------
ACCEL_CLAMP_FACTOR = 3.0
PROCESS_NOISE_THRUST_COEF = 0.023506

GRAVITY = [0.0, 0.0, -9.81]

# ---------------------------------------------------------
# Guidance Torque Limits
# ---------------------------------------------------------
# Maximum attitude torque the controller may command (Nm).
# 
# CRITICAL: Excessive torque causes aggressive pitching that tilts the
# vessel away from retrograde, losing braking efficiency and causing
# large horizontal velocity. The gimbals should provide only fine steering
# corrections, not large attitude changes.
#
# The AttitudeController (via reaction wheels) provides the primary
# attitude hold when SAS is off. Gimbals are for fine steering only.
# Set torque low enough that gimbal deflections stay under 1° typically.
GUIDANCE_MAX_TORQUE = [50.0, 50.0, 50.0]

# Per-phase maximum tilt (degrees) for the attitude target.
# Small values keep lateral speed low by limiting how far the rocket
# can lean.  Used as the max_pitch_deg argument to compute_wrench().
# 5° tilt ≈ 0.85 m/s² lateral acceleration ≈ gentle steering.
ATT_TILT_HOVER_DEG = 8.0
ATT_TILT_TERMINAL_DEG = 6.0
ATT_TILT_POWERED_DESCENT_DEG = 15.0

# ---------------------------------------------------------
# Reaction Wheel Authority Limiter
# ---------------------------------------------------------
# KSP reaction wheels are overpowered.  Limit them here as a fraction
# of their maximum torque (0–1) so the gimbals and aerodynamic surfaces
# do meaningful work.  Applied once at activation.
REACTION_WHEEL_TORQUE_LIMIT = 0.1

# ---------------------------------------------------------
# Roll Correction Gain
# ---------------------------------------------------------
# The PD torque law produces err_axis = cross(Y_body, target_up) which has
# zero Y-component -- roll is unobservable.  This gain adds an explicit roll-
# error term that keeps the belly (body Z) pointing toward NED down.
# tau_roll_add = J[1,1] * kp_att[1] * ROLL_CORRECTION_KP * roll_err
# Start at 2.0; increase for tighter roll hold, decrease if fighting SAS.
ROLL_CORRECTION_KP = 2.0

# ---------------------------------------------------------
# Application Logging
# ---------------------------------------------------------
DEBUG_LOGGING = False
LOG_TO_FILE = True
LOG_FILE_PATH = "logs/aegis.log"

# ---------------------------------------------------------
# HUD Display
# ---------------------------------------------------------
HUD_ENABLED = False
HUD_REFRESH_HZ = 10.0
