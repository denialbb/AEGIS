# ---------------------------------------------------------
# AEGIS — Landing Accuracy Standard
# ---------------------------------------------------------
# Pass/fail envelope for the HOVER_TARGETING + TERMINAL_DESCENT phases.
# Computed from logs/latest/telemetry.csv by scripts/score_landing.py
# (extended). Encoded as a pytest assertion by tests/test_landing_standard.py
# (to be written). All distance/velocity metrics use EKF estimates
# (state_vector[:2] and state_vector[3:6] logged as pos_n/pos_e/vel_x/y/z);
# kRPC truth is unavailable for position/velocity in the current telemetry
# pipeline, so the thresholds assume an EKF-truth gap of <= 1.0 m at
# touchdown (typical once Mahony bias has converged).

# ── Touchdown accuracy (computed at touchdown tick) ────────────
# Touchdown tick = first row where est_alt <= TOUCHDOWN_ALTITUDE
# (aegis.conf). Position/velocity are EKF estimates.
LANDING_TOUCHDOWN_DIST_TARGET_M    = 2.0
LANDING_TOUCHDOWN_DIST_FAIL_M      = 5.0

LANDING_TOUCHDOWN_VH_TARGET_MS     = 0.5
LANDING_TOUCHDOWN_VH_FAIL_MS       = 2.0

LANDING_TOUCHDOWN_VZ_TARGET_MS     = 0.8
LANDING_TOUCHDOWN_VZ_FAIL_MS       = 2.0

# ── Trajectory quality (during HOVER_TARGETING + TERMINAL_DESCENT) ──
# Approach time = elapsed timestamp between entering HOVER_TARGETING
# (from events.jsonl STATE_TRANSITION) and touchdown tick.
LANDING_APPROACH_TIME_TARGET_S     = 30.0
LANDING_APPROACH_TIME_FAIL_S       = 60.0

# Lateral overshoot peak = max(dist) over the HOVER_TARGETING +
# TERMINAL_DESCENT phase window. Measures how far past the pad the
# vehicle drifted laterally during approach.
LANDING_OVERSHOOT_TARGET_M         = 0.5
LANDING_OVERSHOOT_FAIL_M           = 2.0

# ── Attitude at touchdown ──────────────────────────────────────
LANDING_ROLL_TARGET_DEG            = 5.0
LANDING_ROLL_FAIL_DEG              = 15.0

# EKF-truth attitude gap at touchdown (catches estimator bias).
# Mahony should be within MAHONY_CONVERGED_DEG of kRPC truth once
# biases have converged. Larger gap = estimation is untrustworthy.
LANDING_ATTITUDE_EKF_TRUTH_DEG     = 3.0
